  <style>

      display: none;

    .license-box.visible { display: block; }

      flex: 1;

      background: #ffffff;
      border: 1px solid #d1fae5;

<body>
  <div class="card">
    <div class="checkmark">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Payment Successful!</h1>
    <p class="status" id="statusMsg">
      <span class="spinner"></span> Activating your license...
    </p>
    <p class="info" id="infoMsg">
      SearchDash will activate automatically.
    </p>

    <div class="license-box" id="licenseBox">
      <div class="label" id="licenseLabel">Your License Key</div>
      <div class="key-row">
        <span class="key-text" id="licenseKeyText"></span>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
      <p class="hint" id="licenseHint"></p>
    </div>
  </div>

  <script>
    (function() {
      var statusEl = document.getElementById('statusMsg');
      var infoEl = document.getElementById('infoMsg');
      var licenseBox = document.getElementById('licenseBox');
      var licenseLabel = document.getElementById('licenseLabel');
      var licenseKeyText = document.getElementById('licenseKeyText');
      var licenseHint = document.getElementById('licenseHint');
      var copyBtn = document.getElementById('copyBtn');

      var params = new URLSearchParams(window.location.search);

      var checkoutId = params.get('checkout_id')
        || params.get('checkout')
        || params.get('checkoutId')
        || params.get('id')
        || '';

      var orderId = params.get('order_id')
        || params.get('order')
        || params.get('orderId')
        || '';

      function showLicenseKey(key, isSuccess) {
        licenseKeyText.textContent = key;
        licenseBox.classList.add('visible');
        if (isSuccess) {
          licenseLabel.textContent = 'Your License Key';
          licenseHint.textContent = 'Save this key for your records. You can use it to re-activate SearchDash Pro on any device.';
        } else {
          licenseLabel.textContent = 'Your License Key';
          licenseHint.innerHTML = 'Copy this key and paste it into the SearchDash extension <strong>Purchase</strong> page to activate Pro manually.';
        }
      }

      copyBtn.addEventListener('click', function() {
        var key = licenseKeyText.textContent;
        if (!key) return;
        navigator.clipboard.writeText(key).then(function() {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(function() {
            copyBtn.textContent = 'Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        }).catch(function() {
          var range = document.createRange();
          range.selectNode(licenseKeyText);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(function() {
            copyBtn.textContent = 'Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        });
      });

      if (!checkoutId) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Missing checkout information.';
        infoEl.innerHTML = 'The payment was successful but we could not identify your order. Please find your license key in the <a href="https://creem.io/dashboard" target="_blank" style="color:#3b82f6;">Creem Dashboard</a> and activate it manually in the SearchDash extension.';
        return;
      }

      // NOTE: This ID changes after Chrome Web Store publishing. Update it then.
      var extensionId = 'mpjpfdlbhfcejfmaafccigkhcdfclfoi';

      function tryActivate() {
        if (typeof chrome === 'undefined' || !chrome.runtime || !chrome.runtime.sendMessage) {
          statusEl.className = 'status success';
          statusEl.textContent = 'Payment confirmed!';
          infoEl.innerHTML = 'Open the SearchDash extension <strong>Purchase</strong> page and click "Check Payment" to activate.<br><br>Or find your license key in the <a href="https://creem.io/dashboard" target="_blank" style="color:#3b82f6;">Creem Dashboard</a>.';
          return;
        }

        chrome.runtime.sendMessage(extensionId, {
          type: 'paymentSuccess',
          checkoutId: checkoutId,
          orderId: orderId || undefined
        }, function(response) {
          if (chrome.runtime.lastError) {
            statusEl.className = 'status error';
            statusEl.textContent = 'Could not reach the extension.';
            infoEl.innerHTML = 'Please open the SearchDash extension and activate your license manually.<br><br>Find your license key in the <a href="https://creem.io/dashboard" target="_blank" style="color:#3b82f6;">Creem Dashboard</a>.';
            return;
          }

          if (response && response.success) {
            statusEl.className = 'status success';
            statusEl.textContent = 'License activated! All Pro features unlocked.';
            infoEl.textContent = 'You can close this page and start using SearchDash Pro.';
            if (response.licenseKey) {
              showLicenseKey(response.licenseKey, true);
            }
          } else {
            statusEl.className = 'status error';
            statusEl.textContent = 'Activation failed.';
            infoEl.textContent = 'Don\'t worry — you can still activate manually.';

            if (response && response.licenseKey) {
              showLicenseKey(response.licenseKey, false);
            } else {
              infoEl.innerHTML = 'Please open the SearchDash extension and activate your license manually.<br><br>Find your license key in the <a href="https://creem.io/dashboard" target="_blank" style="color:#3b82f6;">Creem Dashboard</a>.';
            }
          }
        });
      }

      tryActivate();
    })();
  </script>
</body>
